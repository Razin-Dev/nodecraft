name: Start Server
on:
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Server name'
        required: true
      mc_version:
        description: 'Minecraft version'
        default: '1.20.4'
      ram:
        description: 'RAM (e.g. 2G)'
        default: '2G'

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install bore tunnel
        run: |
          curl -L https://github.com/ekzhang/bore/releases/latest/download/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv bore /usr/local/bin/

      - name: Download Paper JAR
        run: |
          VERSION="${{ github.event.inputs.mc_version }}"
          BUILD=$(curl -s "https://api.papermc.io/v2/projects/paper/versions/$VERSION/builds" | python3 -c "import sys,json; builds=json.load(sys.stdin)['builds']; print(builds[-1]['build'])")
          curl -o server.jar "https://api.papermc.io/v2/projects/paper/versions/$VERSION/builds/$BUILD/downloads/paper-$VERSION-$BUILD.jar"

      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      - name: Start bore tunnel
        run: |
          bore local 25565 --to bore.pub --secret "${{ secrets.BORE_SECRET }}" &
          sleep 3

      - name: Start Minecraft server
        run: |
          java -Xms512M -Xmx${{ github.event.inputs.ram }} \
            -XX:+UseG1GC \
            -jar server.jar nogui