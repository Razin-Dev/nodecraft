name: Start Server
on:
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Server name'
        required: true
      mc_version:
        description: 'Minecraft version'
        default: '1.20.4'
      ram:
        description: 'RAM (e.g. 2G)'
        default: '2G'

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install bore tunnel
        run: |
          curl -L https://github.com/ekzhang/bore/releases/latest/download/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv bore /usr/local/bin/

      - name: Download Paper JAR
        run: |
          VERSION="${{ github.event.inputs.mc_version }}"
          BUILD=$(curl -s "https://api.papermc.io/v2/projects/paper/versions/$VERSION/builds" | python3 -c "import sys,json; builds=json.load(sys.stdin)['builds']; print(builds[-1]['build'])")
          curl -o server.jar "https://api.papermc.io/v2/projects/paper/versions/$VERSION/builds/$BUILD/downloads/paper-$VERSION-$BUILD.jar"

      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      - name: Start services and command listener
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting bore tunnel..."
          bore local 25565 --to bore.pub --secret "${{ secrets.BORE_SECRET }}" &
          sleep 3

          echo "Starting Minecraft server in background..."
          screen -S mc -d -m java -Xms512M -Xmx${{ github.event.inputs.ram }} \
            -XX:+UseG1GC \
            -jar server.jar nogui
          
          echo "Server started. Waiting 20s for boot..."
          sleep 20

          echo "Starting command listener loop..."
          # Exit loop when screen session ends (server crashes/stops)
          while screen -ls | grep -q "\.mc"; do
            # Check for command file
            if gh api "repos/${{ github.repository }}/contents/.nodecraft/command.txt" > command.json 2>/dev/null; then
              echo "Command file checked"
            else
              echo "No command file found or API error"
              > command.json
            fi
            
            if [[ -s command.json && $(jq -r '.content' command.json 2>/dev/null) != "null" && $(jq -r '.content' command.json 2>/dev/null) != "" ]]; then
              echo "Command file found. Processing..."
              # Decode content and send to server
              COMMAND=$(jq -r '.content' command.json | base64 -d)
              echo "Sending command: $COMMAND"
              screen -S mc -p 0 -X stuff "$COMMAND^M"
              
              # Delete file using gh cli
              echo "Deleting command file..."
              SHA=$(jq -r '.sha' command.json)
              gh api --method DELETE "repos/${{ github.repository }}/contents/.nodecraft/command.txt" \
                -f message="Processed command: $COMMAND" -f sha="$SHA"
            fi
            
            # Stats collection
            MEM_INFO=$(free -m)
            MEM_TOTAL=$(echo "$MEM_INFO" | awk '/^Mem:/{print $2}')
            MEM_USED=$(echo "$MEM_INFO" | awk '/^Mem:/{print $3}')
            
            # Handle division by zero for RAM
            if [ "$MEM_TOTAL" -gt 0 ] 2>/dev/null; then
              RAM_PERCENT=$((MEM_USED * 100 / MEM_TOTAL))
            else
              RAM_PERCENT=0
            fi

            CPU_STATS_1=$(cat /proc/stat)
            CPU_IDLE_1=$(echo "$CPU_STATS_1" | awk '/^cpu /{print $5}')
            CPU_TOTAL_1=$(echo "$CPU_STATS_1" | awk '/^cpu /{print $2+$3+$4+$5+$6+$7+$8}')
            sleep 1
            CPU_STATS_2=$(cat /proc/stat)
            CPU_IDLE_2=$(echo "$CPU_STATS_2" | awk '/^cpu /{print $5}')
            CPU_TOTAL_2=$(echo "$CPU_STATS_2" | awk '/^cpu /{print $2+$3+$4+$5+$6+$7+$8}')

            CPU_IDLE_DELTA=$((CPU_IDLE_2 - CPU_IDLE_1))
            CPU_TOTAL_DELTA=$((CPU_TOTAL_2 - CPU_TOTAL_1))
            CPU_USED_DELTA=$((CPU_TOTAL_DELTA - CPU_IDLE_DELTA))

            # Handle division by zero for CPU
            if [ "$CPU_TOTAL_DELTA" -gt 0 ] 2>/dev/null; then
              CPU_PERCENT=$((CPU_USED_DELTA * 100 / CPU_TOTAL_DELTA))
            else
              CPU_PERCENT=0
            fi

            STATS_JSON=$(printf '{"ram":%d, "cpu":%d}' "$RAM_PERCENT" "$CPU_PERCENT")
            STATS_B64=$(echo -n "$STATS_JSON" | base64 -w 0)

            # Get SHA only if file exists, otherwise leave empty for new file
            STATS_SHA=""
            if gh api "repos/${{ github.repository }}/contents/.nodecraft/stats/${{ github.run_id }}.json" > /dev/null 2>&1; then
              STATS_SHA=$(gh api "repos/${{ github.repository }}/contents/.nodecraft/stats/${{ github.run_id }}.json" --jq '.sha' 2>/dev/null || echo "")
            fi

            if [ -n "$STATS_SHA" ]; then
              gh api --method PUT "repos/${{ github.repository }}/contents/.nodecraft/stats/${{ github.run_id }}.json" \
                -f message="Update stats for run ${{ github.run_id }}" \
                -f content="$STATS_B64" \
                -f sha="$STATS_SHA" > /dev/null 2>&1
            else
              gh api --method PUT "repos/${{ github.repository }}/contents/.nodecraft/stats/${{ github.run_id }}.json" \
                -f message="Update stats for run ${{ github.run_id }}" \
                -f content="$STATS_B64" > /dev/null 2>&1
            fi

            rm -f command.json
            sleep 4
          done
          
          echo "Screen session ended. Server stopped."
