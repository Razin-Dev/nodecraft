name: Backup Server
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p backups
          tar -czf "backups/world_$TIMESTAMP.tar.gz" world/ 2>/dev/null || echo "No world folder yet"

      - name: Commit backup
        run: |
          git config user.name "NodeCraft Bot"
          git config user.email "bot@nodecraft.io"
          git add backups/
          git diff --staged --quiet || git commit -m "Auto-backup $TIMESTAMP"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}